{% extends "crowd_app/main_page_template.html" %}
{% block title%}Upload Media{% endblock%}
{% block content %}
<!-- Main content goes here-->
<h2>Upload Media</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Upload</button>
</form>
<a href="{% url 'media_app:media_index' org.slug %}" class="btn-back">Back to Media List</a>
<!-- End of content variable-->
{% endblock %}

{% extends "crowd_app/main_page_template.html" %}
{% block title%}{{tag.name}}{% endblock%}
{% block content %}
<!-- Main content goes here-->
{% if tag %}

<a class="btn-delete" href="{% url 'media_app:tag_delete' org.slug tag.id %}" onclick="return confirm('Are you sure you want to delete this tag? (All images will be kept.)');">Delete</a>
<br>

{% if media_list %}
        
    {% for media in media_list %}

    <a href="{% url 'media_app:media_view' org.slug media.id %}"><img src="{{ media.media_path.url }}" style="max-width: 256px;"></a>
    <br>
    <br>

    {% endfor %}

{% else %}
<p>No media was found</p>
{% endif %}
{% else %}
<p>No tag was found</p>
{% endif %}

<!-- End of content variable-->
{% endblock %}
